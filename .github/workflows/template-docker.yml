name: "Template — Docker Build, Trivy & Push"

on:
  workflow_call:
    inputs:
      service_name:
        description: "Human-readable service name"
        required: true
        type: string
      service_path:
        description: "Path to the service directory"
        required: true
        type: string
      docker_image_name:
        description: "Docker Hub image name"
        required: true
        type: string
      environment:
        description: "Environment - dev or prod"
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
      SMTP_USERNAME:
        required: true
      SMTP_PASSWORD:
        required: true
      ALERT_EMAIL:
        required: true
    outputs:
      image_tag:
        description: "Final image tag pushed to DockerHub"
        value: ${{ jobs.docker.outputs.image_tag }}

jobs:
  docker:
    name: "4,5,6. Docker — ${{ inputs.service_name }}"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set Dev Image Tag
        if: ${{ inputs.environment == 'dev' }}
        id: dev_tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "image_tag=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Determine Semantic Version
        if: ${{ inputs.environment == 'prod' }}
        id: semver
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ github.token }}
          tag_prefix: "${{ inputs.service_name }}/v"
          default_bump: patch
          initial_version: "1.0.0"
          custom_release_rules: "feature:minor:Features,breaking:major:Breaking Changes"
          dry_run: false

      - name: Set Prod Image Tag
        if: ${{ inputs.environment == 'prod' }}
        id: prod_tag
        run: |
          echo "image_tag=v${{ steps.semver.outputs.new_version }}" >> $GITHUB_OUTPUT

      - name: Set Final Image Tag
        id: meta
        run: |
          if [ "${{ inputs.environment }}" = "dev" ]; then
            IMAGE_TAG="${{ steps.dev_tag.outputs.image_tag }}"
          else
            IMAGE_TAG="${{ steps.prod_tag.outputs.image_tag }}"
          fi

          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.docker_image_name }}"

          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "full_image=${IMAGE}:${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ steps.meta.outputs.full_image }} \
            -f ${{ inputs.service_path }}/Dockerfile \
            ${{ inputs.service_path }}

      - name: Trivy Container Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.full_image }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Push Docker Image to DockerHub
        run: |
          docker push ${{ steps.meta.outputs.full_image }}

      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "WellNest CI Failed — Docker (${{ inputs.service_name }})"
          to: ${{ secrets.ALERT_EMAIL }}
          from: WellNest CI Pipeline
          body: |
            Docker build/push FAILED for: ${{ inputs.service_name }}

            Environment: ${{ inputs.environment }}
            Branch     : ${{ github.ref_name }}
            Commit     : ${{ github.sha }}
            Author     : ${{ github.actor }}

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}